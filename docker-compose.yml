services:
  postgres:
    image: postgres:16-alpine
    container_name: nudge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-nudge_signal}
      POSTGRES_USER: ${DB_USERNAME:-nudge}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nudge}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-nudge} -d ${DB_NAME:-nudge_signal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nudge-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
