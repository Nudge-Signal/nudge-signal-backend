spring:
  application:
    name: nudge-signal-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}

server:
  port: ${SERVER_PORT}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    com.nudgesignal: DEBUG
